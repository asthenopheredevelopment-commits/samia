name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        # numpy<2 pins to the 1.x ABI the upstream stack (scipy via
        # sentence-transformers) is built against; CI runners have no GPU so the
        # CPU torch wheel is pulled automatically.
        run: |
          python -m pip install --upgrade pip
          pip install "numpy<2" -e ".[test]"

      - name: Run the test suite
        # No GPU on the runner; the one GPU-gated test skips automatically.
        env:
          CUDA_VISIBLE_DEVICES: ""
        run: pytest samia/ -q
